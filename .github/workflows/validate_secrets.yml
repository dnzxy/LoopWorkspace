name: 1. Validate Secrets
run-name: Validate Secrets
on: [workflow_call, workflow_dispatch]
  
jobs:
  infrastructure:
    runs-on: macos-13
    steps:
      # Checks-out the repo
      - name: Check Match-Secrets existence and create
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Validating existence of Match-Secrets repository... "
          if [ "$(gh repo list --json name | jq --raw-output 'any(.name=="Match-Secrets")')" != "true" ]; then
            echo "No Match-Secrets repository found... ";
            echo "Creating private repository... ";
            gh repo create Match-Secrets --private
            
            if [ "$(gh repo list --json name,visibility | jq --raw-output 'any(.name=="Match-Secrets")')" == "true" ]; then
              echo "Successfully created Match-Secrets repository"
            else
              # Exit unsuccessfully if creation failed.
              echo "::error::Private `Match-Secrets` repository could not be created! Please try again."
              exit 2
            fi
          else
            echo "Match-Secrets repository already exists! Proceeding with validation of repository secrets... ";
          fi

  validate:
    runs-on: macos-13
    needs: infrastructure
    steps:
      # Checks-out the repo
      - name: Checkout Repo
        uses: actions/checkout@v3
       
      # Validates the repo secrets
      - name: Validate Secrets
        run: |
          # Validate Secrets
          echo Validating Repository Secrets...
          
          # Validate TEAMID
          if [ -z "$TEAMID" ]; then
            failed=true
            echo "::error::TEAMID secret is unset or empty. Set it and try again."
          elif [ ${#TEAMID} -ne 10 ]; then
            failed=true
            echo "::error::TEAMID secret is set but has wrong length. Verify that it is set correctly and try again."
          elif ! [[ $TEAMID =~ ^[A-Z0-9]+$ ]]; then
            failed=true
            echo "::error::Match-Secrets repository could not be created! is set but invalid. Verify that it is set correctly (only uppercase letters and numbers) and try again."
          fi
          
          # Validate GH_PAT
          if [ -z "$GH_PAT" ]; then
            failed=true
            echo "::error::GH_PAT secret is unset or empty. Set it and try again."
          elif [ "$(gh api -H "Accept: application/vnd.github+json" /repos/${{ github.repository_owner }}/Match-Secrets | jq --raw-output '.permissions.push')" != "true" ]; then
            failed=true
            echo "::error::GH_PAT secret is set but invalid or lacking appropriate privileges on the ${{ github.repository_owner }}/Match-Secrets repository. Verify that it is set correctly and try again."
          
          # Legacy browser builder validations (in case they modify their setup)!
          
          elif [ "$(gh repo list --json name | jq --raw-output 'any(.name=="Match-Secrets")')" != "true" ]; then
            failed=true
            echo "::error::GH_PAT secret is set but Match-Secrets repository is missing or configured incorrectly. Verify that the repository was created and that its name is spelled correctly (uppercase 'M' for 'Match', uppercase 'S' and plural for 'Secrets', dash character '-' between the words as separator)."
          elif [ "$(gh repo list --json name,visibility | jq --raw-output '.[] | select(.name=="Match-Secrets") | .visibility')" != "PRIVATE" ]; then
            failed=true
            echo "::error::Match-Secrets repository visibility is set to PUBLIC. Set it to PRIVATE and try again."
          fi
          
          # Validate FASTLANE_ISSUER_ID, FASTLANE_KEY_ID, and FASTLANE_KEY
          FASTLANE_KEY_ID_PATTERN='^[A-Z0-9]+$'
          FASTLANE_ISSUER_ID_PATTERN='^\{?[A-F0-9a-f]{8}-[A-F0-9a-f]{4}-[A-F0-9a-f]{4}-[A-F0-9a-f]{4}-[A-F0-9a-f]{12}\}?$'
          if [ -z "$FASTLANE_ISSUER_ID" ] || [ -z "$FASTLANE_KEY_ID" ] || [ -z "$FASTLANE_KEY" ]; then
            failed=true
            [ -z "$FASTLANE_ISSUER_ID" ] && echo "::error::The FASTLANE_ISSUER_ID secret is unset or empty. Set it and try again."
            [ -z "$FASTLANE_KEY_ID"    ] && echo "::error::The FASTLANE_KEY_ID secret is unset or empty. Set it and try again."
            [ -z "$FASTLANE_KEY"       ] && echo "::error::The FASTLANE_KEY secret is unset or empty. Set it and try again."
          elif [ ${#FASTLANE_KEY_ID} -ne 10 ]; then
            failed=true
            echo "::error::FASTLANE_KEY_ID secret is set but has wrong length. Verify that it is set correctly and try again."
          elif ! [[ $FASTLANE_KEY_ID =~ $FASTLANE_KEY_ID_PATTERN ]]; then
            failed=true
            echo "::error::FASTLANE_KEY_ID is set but invalid. Verify that it is set correctly (only uppercase letters and numbers) and try again."
          elif ! [[ $FASTLANE_ISSUER_ID =~ $FASTLANE_ISSUER_ID_PATTERN ]]; then
            failed=true
            echo "::error::FASTLANE_ISSUER_ID is set but invalid. Verify that it is set correctly (adhering to UUID format) and try again."
          elif ! echo "$FASTLANE_KEY" | openssl pkcs8 -nocrypt >/dev/null; then
            failed=true
            echo "::error::The FASTLANE_KEY secret is set but invalid. Verify that it is set correctly and try again."
          elif ! fastlane validate_secrets; then
            failed=true
            echo "::error::Unable to create a valid authorization token for the App Store Connect API.\
            Verify that the FASTLANE_ISSUER_ID, FASTLANE_KEY_ID, and FASTLANE_KEY secrets are set correctly and try again."
          fi
          
          # Validate MATCH_PASSWORD
          if [ -z "$MATCH_PASSWORD" ]; then
            failed=true
            echo "::error::The MATCH_PASSWORD secret is unset or empty. Set it and try again."
          fi
          
          # Exit unsuccessfully if secret validation failed.
          if [ $failed ]; then
            exit 2
          fi
        shell: bash
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_PAT }} # necessary to set this, so that gh CLI commands in validate step use the Looper's GH_PAT
